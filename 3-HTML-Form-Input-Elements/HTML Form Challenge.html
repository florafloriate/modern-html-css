<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
</head>
<body>
    <header>
        <h1>Apartment Search</h1>
    </header>

    <main>
        <form>
            <div>
            <label for="Location">Location</label>
            <input type="text" id="Location" name="Location" placeholder="Enter a location">
        </div>

        <br>

        <div>
            <label for="Monthly-Price">Monthly Price</label>
            <input type="range" id="Monthly-Price" name="Monthly-Price">
        </div>

        <br>

        <div>
            <label for="Bedrooms">Number of Bedrooms</label>
            <input type="number" id="Bedrooms" name="Bedrooms">
        </div>

        <br>

        <div>
            <label for="Bathrooms">Number of Bathrooms</label>
            <input type="number" id="Bathrooms" name="Bathrooms">
        </div>

        <br>

        <div>
            <label for="Pets">Pets Allowed</label>
            <input type="checkbox" id="Pets" name="Pets">
        </div>

        <br>

        <div>
            <label for="Date">Date Available</label>
            <input type="date" id="Date" name="Date">
        </div>

        <br>
        
        <div>
          <input type="submit" value="Submit" />
        </div>
        </form>
    </main>    
</body>
</html>
