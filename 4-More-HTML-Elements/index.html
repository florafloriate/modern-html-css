<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>More HTML Elements</h1>

    <!-- AUDIO -->
    <h2>Audio</h2>
    <audio controls>
        <source src="sample.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

    <!-- VIDEO -->
    <h2>Video</h2>
    <video width="250" controls>
        <source src="sample.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <!-- IMAGE MAP -->
    <h2>Image Map</h2>
    <img src="https://via.placeholder.com/200" usemap="#map1" alt="Example Image">
    <map name="map1">
        <area shape="rect" coords="0,0,100,100" href="https://example.com" alt="Clickable Area">
    </map>

    <!-- TABLE -->
    <h2>Table</h2>
    <table>
        <tr>
        <th>Name</th>
        <th>Age</th>
        </tr>
        <tr>
        <td>John</td>
        <td>25</td>
        </tr>
    </table>

    <!-- IFRAME -->
    <h2>Iframe</h2>
    <iframe src="https://example.com" width="300" height="150"></iframe>

    <!-- GLOBAL ATTRIBUTES -->
    <h2>Global Attributes</h2>
    <p id="para1" class="text" title="Tooltip text" contenteditable="true">
        You can edit this text
    </p>

    <!-- SVG -->
    <h2>SVG</h2>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" fill="lightblue"></circle>
    </svg>

    <!-- POPOVER -->
    <h2>Popover</h2>
    <button popovertarget="mypop">Open Popover</button>
    <div id="mypop" popover>
        Hello! This is a popover.
    </div>

    <!-- DETAILS -->
    <h2>Details</h2>
    <details>
        <summary>Click to expand</summary>
        <p>This is hidden content.</p>
    </details>

    <!-- PROGRESS -->
    <h2>Progress</h2>
    <progress value="70" max="100"></progress>

    <!-- METER -->
    <h2>Meter</h2>
    <meter value="0.6">60%</meter>

</body>
</html>
